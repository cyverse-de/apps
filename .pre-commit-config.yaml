repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files

  - repo: local
    hooks:
#      - id: cljfmt
#        name: cljfmt
#        language: system
#        entry: lein cljfmt check
#        pass_filenames: false
#        types: [file]
#        files: \.clj$

      - id: clj-kondo
        name: clj-kondo
        language: system
        entry: lein clj-kondo --lint src test
        pass_filenames: false
        types: [file]
        files: \.clj$
